version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: egx_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-egx_root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-egxnexus}
    ports:
      - "3306:3306"
    volumes:
      - ./services/data-store/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

  timescale:
    image: timescale/timescaledb:latest-pg14
    container_name: egx_timescale
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-egx_pg_pass}
    ports:
      - "5432:5432"
    volumes:
      - ./services/data-store/timescale/init.sql:/docker-entrypoint-initdb.d/init.sql
      - timescale_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: egx_redis
    restart: always
    ports:
      - "6379:6379"

  core-brain:
    build:
      context: ./services/core-brain
      target: development
    container_name: egx_core_brain
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    depends_on:
      - redis
    volumes:
      - ./services/core-brain:/app
      - /app/node_modules

  auth-gateway:
    build:
      context: ./services/auth-gateway
      target: development
    container_name: egx_auth_gateway
    restart: always
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    depends_on:
      - redis
    volumes:
      - ./services/auth-gateway:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    container_name: egx_nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-brain
      - auth-gateway

volumes:
  mysql_data:
  timescale_data:
