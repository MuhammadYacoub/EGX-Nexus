events { worker_connections 1024; }

http {
  upstream core_brain    { server core-brain:3000; }
  upstream auth_gateway  { server auth-gateway:3001; }

  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://core_brain/;
      proxy_set_header Host $host;
    }

    location /auth/ {
      proxy_pass http://auth_gateway/;
      proxy_set_header Host $host;
    }
  }
}
